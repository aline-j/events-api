name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -t events-api:latest .

    - name: Run container
      run: |
        docker run -d -p 5000:5000 --name events-api-container events-api:latest
        for i in {1..20}; do
          if curl -fsS http://localhost:5000/api/health; then
            echo "Health check OK"
            exit 0
          fi
          echo "Waiting for API...($i)"
          sleep 1
        done
        
        echo "Health check failed"
        docker logs events-api-container || true
        exit 1

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements-test.txt

    - name: Start tests
      run: |
        pytest -v
        
    - name: Cleanup container
      if: always()
      run: |
        docker stop events-api-container || true
        docker rm events-api-container || true

    - name: Login to Docker
      uses: docker/login-action@v3
      with:
        username: ${{secrets.DOCKERHUB_USERNAME}}
        password: ${{secrets.DOCKERHUB_TOKEN}}

    - name: Tag Docker image
      run: |
        docker tag events-api:latest ${{secrets.DOCKERHUB_USERNAME}}/events-api:latest

    - name: Push to Docker Hub
      run: |
        docker push ${{secrets.DOCKERHUB_USERNAME}}/events-api:latest

    - name: Trigger Render redeploy
      run: |
        curl -fsS -X POST ${{secrets.RENDER_DEPLOY_HOOK}}

    - name: Smoke test against Render
      run: |
        for i in {1..20}; do
          if curl -fsS ${{secrets.RENDER_BASE_URL}}/api/health; then
            echo "Render deployment healthy"
            exit 0
          fi
          echo "Waiting for Render service...($i)"
          sleep 3
        done
        
        echo "Render smoke test failed"
        exit 1