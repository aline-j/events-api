name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -t events-api:latest .

    - name: Run container
      run: |
        docker run -d -p 5000:5000 --name events-api-test events-api:latest
        for i in {1..20}; do
          if curl -fsS http://localhost:5000/api/health; then
            echo "Health check OK"
            exit 0
          fi
          echo "Waiting for API...($i)"
          sleep 1
        done
        
        echo "Health check failed"
        docker logs events-api-test || true
        exit 1

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements-test.txt

    - name: Start tests
      run: |
        pytest -v